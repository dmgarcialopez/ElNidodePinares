<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Nido de Pinares</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="El Nido">
    <link rel="manifest" href="manifest.json">

    <link rel="icon" type="image/png" href="icons/logo-hotel.png">
    <link rel="apple-touch-icon" href="icons/logo-hotel.png">
    <meta name="theme-color" content="#2e7d32">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-plugins@3.4.0/layer/vector/KML.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>

<body>
    <div id="app">

        <section id="home-screen" class="screen">
            <header>
                <div class="header-container">
                    <img src="icons/logo-hotel.png" class="logo" alt="Logo">
                    <div class="header-text">
                        <h1>El Nido de Pinares</h1>
                        <h2>Hotel Rural con SPA en Navaleno</h2>
                    </div>
                </div>
                <div class="header-text">
                        <h2>     </h2>
                        <h3>Información Turística de la Comarca de Pinares entre Burgos y Soria</h3>
                </div>
            </header>
            
            <div class="menu-principal"; style="width: 100%; display: flex; justify-content: center; padding: 10px;">
                <div class="bloque-grid"; style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; justify-items: center;">                    
                   <button id="btn-pois" class="btn-circle"><img src="icons/poi.png"></button>
                   <button id="btn-bici" class="btn-circle"><img src="icons/bici.png"></button>
                   <button id="btn-walk" class="btn-circle"><img src="icons/walk.png"></button>
                </div>
                <div class="bloque-grid"; style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; justify-items: center;">
                    <a href="https://www.elnidodepinares.es/actividades/?utm_source=PWA" class="btn-circle"><img src="icons/climb.png"></a>
                    <button id="btn-nav" class="btn-circle"><img src="icons/Navegacion.png"></button>
                    <a href="https://www.elnidodepinares.es/nuestro-blog/?utm_source=PWA" class="btn-circle"><img src="icons/photos.png"></a>                   
                </div>
                <div class="bloque-grid"; style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; justify-items: center;">
                    <a href="https://www.elnidodepinares.es/hoteles/?utm_source=PWA" class="btn-circle"><img src="icons/hotel.png"></a>
                    <a href="https://www.elnidodepinares.es/?utm_source=PWA" class="btn-circle"><img src="icons/logo-small.png"></a>
                    <a href="https://www.elnidodepinares.es/donde-comer/?utm_source=PWA" class="btn-circle"><img src="icons/food.png"></a>
                </div>
                <div class="bloque-grid"; style="display: grid; grid-template-columns: repeat(1, 1fr); gap: 40px; justify-items: center;">
                    <button id="btn-game" class="btn-circle"><img src="icons/BuscaDuendes.png"></button>                    
                </div>
                <div style="margin-top: 15px; text-align: center;">
                    <button onclick="startVoiceSearch()" class="btn-circle"><img src="icons/microfono.png"></button>
                    <div id="mic-status" style="font-size: 13px; font-weight: bold; color: white; margin-top: 8px; height: 18px; text-shadow: 1px 1px 2px black;"></div>
                </div>
            </div>
        </section>

        <section id="view-screen" class="screen hidden">
            <div id="map-container"></div>
            <div id="list-container" class="hidden"></div>
        </section>

        <section id="game-screen" class="screen hidden">
            <div id="game-header" style="display: flex; align-items: center; justify-content: center; gap: 30px; padding: 10px;">
                <button id="btn-album" class="btn-circle"><img src="icons/CapDuende.png"></button>
                <div style="text-align: center;">
                    <div id="closest-info" style="color: white; font-weight: bold;">Buscando...</div>
                    <div id="duende-name" style="color: #ffeb3b; font-size: 1.1em;">---</div>
                </div>
            </div>

            <div id="game-map" style="width: 100%; height: 40%; border-bottom: 2px solid rgba(255,255,255,0.2);"></div>

            <div id="game-controls">
               <div id="video-container" style="width: 220px; height: 220px; margin: 15px auto; cursor: pointer; border-radius: 20px; overflow: hidden; border: 3px solid white; position: relative; background: #2e7d32;">
                    <video id="game-video" autoplay muted loop playsinline style="position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%) scale(1.4); object-fit: cover;"></video>
               </div>
            </div>
        </section>

       <section id="album-screen" class="screen hidden" style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('icons/FondoDuendes.png'); background-size: cover; overflow-y: auto;">
            <div id="album-header" style="text-align: center; padding: 25px 15px 10px;">
               <h2 style="color: white; text-shadow: 2px 2px black; margin: 0; font-size: 24px;">Álbum de Capturas</h2>
            </div>
            <div id="album-content">
            </div>
       </section>

       <section id="nav-screen" class="screen hidden">
          <div class="nav-container">
             <div id="nav-header" style="display: flex; align-items: center; justify-content: center; gap: 30px; padding: 10px;">
               <div id="track-name" style="color: white; font-weight: 700; font-size: 22px; padding: 10px; text-transform: uppercase; letter-spacing: 1px; font-family: sans-serif;">Nombre del Track</div>
            </div>
            <div id="nav-map" class="nav-map"></div>
            <div class="nav-row-grid">                    
               <button onclick="SeleccionarTrack()" class="btn-circle1"><img src="icons/OpenFile.png"></button>
               <button id="btn-seguir" onclick="togglesegir()" class="btn-circle1"><img src="icons/NOSeguir.png"></button>        
               <button id="btn-record" onclick="toggleRecording()" class="btn-circle1"><img src="icons/NOREC.png"></button>              
               <button onclick="ciclarCapas()" class="btn-circle1"><img src="icons/Maplayer.png"></button>
               <button onclick="finalizarYExportar()" class="btn-circle1"><img src="icons/SaveFile.png"></button>    
            </div>
          </div>
       </section>

    </div>
    <script type="module" src="js/app.js"></script>
<div id="toast-aviso" class="hidden" style="position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(27, 94, 32, 0.9); color: white; padding: 12px 25px; border-radius: 25px; z-index: 10000; font-weight: bold; text-align: center; min-width: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
    <span id="toast-text"></span>
</div>

<div id="custom-confirm" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center;">
    <div style="background: white; padding: 25px; border-radius: 20px; text-align: center; width: 85%; max-width: 320px; border: 4px solid #1b5e20;">
        <p id="confirm-text" style="color: #333; font-weight: bold; margin-bottom: 25px; font-size: 1.1em; line-height: 1.4;"></p>
        <div style="display: flex; justify-content: space-around; gap: 10px;">
            <button id="confirm-no" style="background: #ccc; color: #333; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; flex: 1;">CANCELAR</button>
            <button id="confirm-si" style="background: #1b5e20; color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; flex: 1;">LIBERAR</button>
        </div>
    </div>
</div>

<div id="custom-prompt" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; display: flex; align-items: center; justify-content: center;">
    <div style="background: white; padding: 25px; border-radius: 20px; text-align: center; width: 85%; max-width: 320px; border: 4px solid #1b5e20;">
        <p style="color: #333; font-weight: bold; margin-bottom: 15px; font-size: 1.1em;">Nombre de la ruta</p>
        
        <input type="text" id="prompt-input" style="width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ccc; margin-bottom: 20px; font-size: 16px; box-sizing: border-box; outline: none; text-align: center;">
        
        <div style="display: flex; justify-content: space-around; gap: 10px;">
            <button id="prompt-cancel" style="background: #ccc; color: #333; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; flex: 1;">CANCELAR</button>
            <button id="prompt-save" style="background: #1b5e20; color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; flex: 1;">GUARDAR</button>
        </div>
    </div>
</div>

</div>
<div id="pwa-toast" style="
    display: none; 
    position: fixed; 
    bottom: 50px; 
    left: 50%; 
    transform: translateX(-50%); 
    background: #ff0000; /* Rojo para que lo veas sí o sí */
    color: white; 
    padding: 15px 30px; 
    border-radius: 50px; 
    font-family: sans-serif; 
    font-weight: bold;
    z-index: 999999; /* Por encima de todo */
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    text-align: center;
    white-space: nowrap;
    border: 2px solid white;
"></div>
</body>
</html>
